  /api/v1/internal/merchants/{merchant_id}/users/{user_id}/role:
    patch:
      tags: [ Internal ]
      summary: Update merchant member role (Internal Admin Override)
      description: |
        Internal admin override to update a merchant member's role.

        This endpoint is restricted to Qredex internal administrators for recovery and incident handling.
        It bypasses normal merchant authorization but enforces safety rules:

        - Merchant must exist and be ACTIVE
        - Target user must be a member of the merchant
        - Cannot demote the last OWNER (would leave merchant with zero OWNERs)
        - Promoting to OWNER is always allowed (recovery path)

        All attempts (success and failure) are audit logged.
      security:
        - InternalJwt: [ ]
      parameters:
        - in: path
          name: merchant_id
          required: true
          schema:
            type: string
            format: uuid
          description: The merchant identifier
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
          description: The user identifier (member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMerchantMemberRoleRequest"
      responses:
        "200":
          description: Merchant member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantUserResponse"
        "401":
          description: Unauthorized - Invalid or missing Internal JWT
        "403":
          description: Forbidden - Insufficient privileges or attempting to demote last OWNER
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found - Merchant or user does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - Merchant is not ACTIVE or has been uninstalled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

