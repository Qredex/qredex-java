      summary: Create merchant (Internal Admin)
      description: |
        Creates a new merchant account with optional store and Direct API client.
        Set `direct_client_display_name` to provision the initial Direct API client.
        This endpoint is for Qredex admin users (authenticated via Internal JWT).
      security:
