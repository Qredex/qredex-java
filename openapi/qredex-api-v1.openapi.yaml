openapi: 3.0.3
info:
  title: Qredex Core API
  version: "1.0.0"
  description: |
    Qredex v1 API contract for Shopify app, merchant APIs, integration APIs, and internal APIs.
servers:
  - url: https://api.qredex.com
    description: Production
  - url: https://staging-api.qredex.com
    description: Staging
  - url: http://localhost:8080
    description: Local development

tags:
  # Auth zone (public)
  - name: Auth
    description: Authentication endpoints (public)
  # Webhooks zone (public)
  - name: Webhooks
    description: Webhook endpoints (public, signature-verified)
  # Agent zone (client-runtime)
  - name: Agent
    description: Agent zone API (client-runtime, unauthenticated)
  # Merchant zone (Human Dashboard)
  - name: Merchant
    description: Merchant dashboard API (human users)
  # Integrations zone (SDK/machine)
  - name: Integrations
    description: Integrations API (SDK/machine-to-machine)
  # Internal zone (Qredex admin)
  - name: Internal
    description: Internal admin endpoints

paths:
  /api/v1/auth/shopify/install:
    get:
      tags: [ Auth ]
      summary: Start Shopify OAuth install
      parameters:
        - in: query
          name: shop
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to Shopify OAuth grant

  /api/v1/auth/shopify/callback:
    get:
      tags: [ Auth ]
      summary: Complete Shopify OAuth callback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: hmac
          required: true
          schema:
            type: string
        - in: query
          name: shop
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: host
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect into embedded app

  /api/v1/auth/shopify/exchange:
    post:
      tags: [ Auth ]
      summary: Exchange Shopify session token for merchant JWT + refresh
      security:
        - ShopifySession: [ ]
      responses:
        "200":
          description: Merchant tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantApiTokenResponse"
        "403":
          description: Forbidden - Invalid or missing Shopify session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/auth/internal/token:
    post:
      tags: [ Auth ]
      summary: Issue internal API token using bootstrap basic credentials
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueInternalTokenRequest"
      responses:
        "200":
          description: Internal tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAuthTokenResponse"

  /api/v1/auth/internal/refresh:
    post:
      tags: [ Auth ]
      summary: Refresh internal API token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Internal tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAuthTokenResponse"

  /api/v1/auth/internal/revoke:
    post:
      tags: [ Auth ]
      summary: Revoke current internal access token session
      security:
        - InternalJwt: [ ]
      responses:
        "204":
          description: Revoked
        "403":
          description: Forbidden - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/auth/merchant/password/setup:
    post:
      tags: [ Auth ]
      summary: Redeem one-time merchant setup code and issue merchant tokens
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupMerchantPasswordRequest"
      responses:
        "200":
          description: Merchant tokens issued after successful password setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantApiTokenResponse"
        "400":
          description: Invalid setup code (errorCode=invalid_setup_code) or request validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Merchant setup subject not found (unknown email or no merchant membership)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Password is already set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/auth/merchant/password/login:
    post:
      tags: [ Auth ]
      summary: Merchant password login
      description: |
        Public login endpoint for merchant dashboard users.
        Uses non-enumerating semantics: unknown email, non-member users, and wrong password all return 401.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantPasswordLoginRequest"
      responses:
        "200":
          description: Merchant tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantApiTokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: Merchant user or merchant account is inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/auth/merchant/password/refresh:
    post:
      tags: [ Auth ]
      summary: Refresh merchant JWT
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Merchant tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantApiTokenResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/auth/merchant/password/revoke:
    post:
      tags: [ Auth ]
      summary: Revoke merchant refresh token
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "204":
          description: Revoked (idempotent)
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/merchant/me:
    get:
      tags: [ Merchant ]
      summary: Merchant summary for current merchant JWT
      security:
        - MerchantJwt: [ ]
      responses:
        "200":
          description: Merchant summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantSummaryResponse"

  /api/v1/merchant/me/health:
    get:
      tags: [ Merchant ]
      summary: Merchant health for current merchant JWT
      security:
        - MerchantJwt: [ ]
      responses:
        "200":
          description: Health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantHealthResponse"

  /api/v1/merchant/me/dashboard:
    get:
      tags: [ Merchant ]
      summary: Merchant dashboard summary metrics
      security:
        - MerchantJwt: [ ]
      responses:
        "200":
          description: Dashboard summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantDashboardResponse"

  /api/v1/merchant/me/dashboard/stores:
    get:
      tags: [ Merchant ]
      summary: Store-scoped dashboard webhook observability
      security:
        - MerchantJwt: [ ]
      responses:
        "200":
          description: Dashboard rows by store
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MerchantStoreDashboardResponse"

  /api/v1/merchant/me/dashboard/stores/{store_id}:
    get:
      tags: [ Merchant ]
      summary: Store-scoped dashboard for one store
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: store_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard row for one store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantStoreDashboardResponse"
        "404":
          description: Store not found in merchant context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/merchant/me/account/disconnect-delete:
    post:
      tags: [ Merchant ]
      summary: Disconnect and delete merchant account
      security:
        - MerchantJwt: [ ]
      responses:
        "200":
          description: Updated merchant summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantSummaryResponse"

  /api/v1/merchant/users:
    get:
      tags: [ Merchant ]
      summary: List merchant members
      security:
        - MerchantJwt: [ ]
      responses:
        "200":
          description: Merchant members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MerchantUserResponse"
    post:
      tags: [ Merchant ]
      summary: Create merchant member
      security:
        - MerchantJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMerchantUserRequest"
      responses:
        "201":
          description: Merchant member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantUserResponse"

  /api/v1/merchant/users/{user_id}/role:
    patch:
      tags: [ Merchant ]
      summary: Update merchant member role
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMerchantUserRoleRequest"
      responses:
        "200":
          description: Merchant member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantUserResponse"

  /api/v1/merchant/users/{user_id}:
    delete:
      tags: [ Merchant ]
      summary: Remove merchant member
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Merchant member removed

  /api/v1/merchant/users/{user_id}/setup:
    post:
      tags: [ Merchant ]
      summary: Issue merchant user setup code
      description: |
        Issues a one-time setup code for an existing merchant member in the same merchant context.
        Only merchant OWNER or ADMIN can issue setup codes. Existing active codes are revoked and
        rotated to a newly issued code.
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Setup code issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueMerchantUserSetupCodeResponse"
        "401":
          description: Unauthorized - missing or invalid Merchant JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: Forbidden - caller is not merchant OWNER or ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Target user is not a member of this merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Target user cannot be onboarded (inactive or password already set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/merchant/ownership/transfer:
    post:
      tags: [ Merchant ]
      summary: Transfer merchant ownership to another active member
      security:
        - MerchantJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferMerchantOwnershipRequest"
      responses:
        "200":
          description: Ownership transferred (or no-op if target already ownership-capable)
        "403":
          description: Caller is not ownership-capable or not an active member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Target user is not an active member of this merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Ownership transfer conflict; caller should retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/merchant/stores:
    post:
      tags: [ Merchant ]
      summary: Create merchant store (direct merchants only)
      security:
        - MerchantJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMerchantStoreRequest"
      responses:
        "201":
          description: Merchant store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantStoreResponse"

  /api/v1/merchant/creators:
    get:
      tags: [ Merchant ]
      summary: List creators
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [ACTIVE, DISABLED]
        - in: query
          name: page
          required: false
          schema:
            type: integer
        - in: query
          name: size
          required: false
          schema:
            type: integer
        - in: query
          name: sort
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Creator page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorPageResponse"
        "400":
          description: Invalid query parameters (for example malformed page, size, or status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      tags: [ Merchant ]
      summary: Create creator
      security:
        - MerchantJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreatorRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorResponse"

  /api/v1/merchant/creators/{creator_id}:
    get:
      tags: [ Merchant ]
      summary: Get creator by UUID
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: creator_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Creator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorResponse"
    patch:
      tags: [ Merchant ]
      summary: Update creator mutable fields
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: creator_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreatorRequest"
      responses:
        "200":
          description: Updated creator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorResponse"

  /api/v1/merchant/creators/{creator_id}/disable:
    post:
      tags: [ Merchant ]
      summary: Disable creator
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: creator_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Disabled creator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorResponse"

  /api/v1/merchant/creators/{creator_id}/enable:
    post:
      tags: [ Merchant ]
      summary: Enable creator
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: creator_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Enabled creator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorResponse"

  /api/v1/merchant/links:
    get:
      tags: [ Merchant ]
      summary: List links
      description: |
        Retrieves a paginated list of influence links with optional filtering.
        
        ## Query Filters
        
        - `status` - Filter by link status (case-insensitive): `ACTIVE` or `DISABLED`
        - `destination` - Filter by exact destination path match
        - `expired` - Filter by expiration status: `true` (expired) or `false` (not expired)
          - `expired=true` returns links where `link_expiry_at` is not null and <= now()
          - `expired=false` returns links where `link_expiry_at` is null or > now()
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
        - in: query
          name: size
          required: false
          schema:
            type: integer
        - in: query
          name: sort
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          description: Filter by link status (ACTIVE or DISABLED, case-insensitive)
          schema:
            type: string
            enum: [ACTIVE, DISABLED]
            example: ACTIVE
        - in: query
          name: destination
          required: false
          description: Filter by exact destination path match
          schema:
            type: string
            example: /collections/summer
        - in: query
          name: expired
          required: false
          description: Filter by expiration status (true = expired, false = not expired)
          schema:
            type: boolean
            example: false
      responses:
        "200":
          description: Link list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkPageResponse"
        "400":
          description: Invalid query parameters (for example malformed page, size, status, destination, or expired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      tags: [ Merchant ]
      summary: Create link
      security:
        - MerchantJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"

  /api/v1/merchant/links/{link_id}:
    get:
      tags: [ Merchant ]
      summary: Get link by UUID
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: link_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
    patch:
      tags: [ Merchant ]
      summary: Update link configuration
      description: |
        Updates the configuration of an existing influence link.
        
        ## Update Rules
        
        | Field | Allowed? | Conditions |
        |-------|----------|------------|
        | `linkName` | ✅ Yes | Anytime |
        | `note` | ✅ Yes | Anytime |
        | `attributionWindowDays` | ⚠️ Restricted | Only if NO intent exists (IIT or PIT). Must be one of: 1, 3, 7, 14, 30 |
        | `linkExpiryAt` | ⚠️ Restricted | Only if NO intent exists. Must be in the future |
        | `discountCode` | ⚠️ Restricted | Only if NO intent exists |
        | `status` | ⚠️ Restricted | `ACTIVE`→`DISABLED`: Always allowed<br>`DISABLED`→`ACTIVE`: Only if NO intent exists |
        | `destinationPath` | ❌ Never | Immutable after creation |
        
        ## Error Responses
        
        - `403 Forbidden` - Returned when attempting to update restricted fields after intent creation
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: link_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkRequest"
      responses:
        "200":
          description: Updated link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "403":
          description: Forbidden - intent already created for this link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/merchant/links/{link_id}/stats:
    get:
      tags: [ Merchant ]
      summary: Get link stats
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: link_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Link stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkStatsResponse"

  /api/v1/merchant/orders:
    get:
      tags: [ Merchant ]
      summary: List order attributions
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
        - in: query
          name: size
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Page of order attributions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderAttributionPageResponse"
        "400":
          description: Invalid query parameters (for example malformed page or size)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/merchant/orders/{order_attribution_id}/details:
    get:
      tags: [ Merchant ]
      summary: Get order attribution details by UUID
      security:
        - MerchantJwt: [ ]
      parameters:
        - in: path
          name: order_attribution_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Detailed order attribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderAttributionDetailsResponse"

  /api/v1/integrations/creators:
    get:
