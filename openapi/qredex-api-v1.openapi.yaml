              schema:
                $ref: "#/components/schemas/CreateInternalMerchantResponse"

  /api/v1/internal/merchants/{merchant_id}:
    patch:
      tags: [ Internal ]
      summary: Update merchant configuration (Internal Admin)
      description: |
        Updates merchant configuration fields. Only provided fields are updated.
        
        ## Updatable Fields
        
        - `enabled_order_sources` - Replaces the enabled order source set
        - `store_domain` - Updates the primary store domain
        - `duplicate_policy` - Updates cross-source duplicate handling policy
        - `migration_override` - Required when changing fields after ingestion started
        - `reason` - Audit reason for migration override operations
        
        ## Migration Override Rules
        
        If ingestion has already started, changes to `enabled_order_sources` or `store_domain`
        require `migration_override=true` and an internal admin caller.
        
        This endpoint is for Qredex admin users (authenticated via Internal JWT).
      security:
        - InternalJwt: [ ]
      parameters:
        - in: path
          name: merchant_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInternalMerchantRequest"
      responses:
        "200":
          description: Merchant configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantSummaryResponse"

