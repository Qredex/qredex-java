  # ========== Agent Zone ==========
  /api/v1/agent/intents/lock:
    post:
      tags: [ Agent ]
      summary: Lock Purchase Intent token (client-runtime)
      description: |
        Locks a Purchase Intent token for order attribution from client-runtime contexts.

        This endpoint is unauthenticated and intended for browser/SDK runtime usage on cart events.
        The merchant context is resolved from the influence intent token provided in the request.

        ## Use Case
        Call this endpoint when a customer adds items to cart or initiates checkout.
        The influence intent token (IIT) is obtained from the redirect flow or stored client-side.

        ## Response
        Returns only the minimum safe data required by client-runtime:
        - `token`: The locked Purchase Intent token
        - `expires_at`: When the intent expires
        - `locked_at`: When the intent was locked

        ## Security
        This endpoint is publicly accessible but validates the influence intent token signature.
        Invalid or expired tokens will be rejected.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentLockIntentRequest"
      responses:
        "201":
          description: Purchase Intent locked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLockIntentResponse"
        "400":
          description: Invalid request or token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Merchant or intent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  # ========== Integrations Zone (Authenticated Machine) ==========
  /api/v1/integrations/intents/lock:
    post:
      tags: [ Integrations ]
      summary: Lock Purchase Intent token (authenticated machine-to-machine)
      description: |
        Locks a Purchase Intent token for order attribution from authenticated machine clients.

        This endpoint requires Direct API (Integrations) JWT authentication and returns the
        **full machine-facing response** with complete attribution details, snapshots, and
        internal identifiers.

        ## Difference from AGENT Zone

        | Aspect | AGENT Zone | INTEGRATIONS Zone |
        |--------|------------|-------------------|
        | Authentication | None (public) | IntegrationsJwt required |
        | Response | Minimal (`token`, `expires_at`, `locked_at`) | Full (`PurchaseIntentResponse`) |
        | Use Case | Browser/SDK runtime | Backend/server-side systems |
        | Fields exposed | 3 safe fields | All attribution details, snapshots, IDs |

        ## Use Case
        Call this endpoint from backend systems, SDKs, or server-side integrations that need
        complete attribution details for order processing and reconciliation.

        ## Security
        Requires valid Direct API JWT with `scope:direct:intents:write` authority.
        The influence intent token signature is also verified before locking.
      security:
        - IntegrationsJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAndLockPurchaseIntentRequest"
            example:
              token: "eyJhbGciOiJIUzI1NiJ9.example"
              source: "browser-cart"
              integrity_version: 2
      responses:
        "201":
          description: Purchase intent locked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseIntentResponse"
        "400":
          description: Invalid request or token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Missing or invalid Integrations JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: Insufficient scope (requires `direct:intents:write`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Merchant or intent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/integrations/intents/{pit}:
    get:
      tags: [ Integrations ]
      summary: Get purchase intent by Purchase Intent token
      description: |
        Retrieves a purchase intent by its Purchase Intent (PIT) token string.

        This is commonly used during order processing to find the purchase intent
        that should be associated with a specific order.
      security:
        - IntegrationsJwt: [ ]
      parameters:
        - in: path
          name: pit
          required: true
          schema:
            type: string
          description: The Purchase Intent token (JWT string)
      responses:
        "200":
          description: Purchase intent found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseIntentResponse"
        "404":
          description: Purchase intent not found for token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/integrations/intents/by-token-id/{token_id}:
    get:
      tags: [ Integrations ]
      summary: Get purchase intent by token ID (UUID)
      description: |
        Retrieves a purchase intent by its token ID (UUID).

        This is useful when you have the token's UUID but not the full JWT token string.
      security:
        - IntegrationsJwt: [ ]
      parameters:
        - in: path
          name: token_id
          required: true
          schema:
            type: string
            format: uuid
          description: The token UUID
      responses:
        "200":
          description: Purchase intent found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseIntentResponse"
        "404":
          description: Purchase intent not found for token ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/integrations/intents/by-iit/{iit}:
    get:
      tags: [ Integrations ]
      summary: Get purchase intent by Influence Intent token
      description: |
        Retrieves a purchase intent by its Influence Intent (IIT) token.

        This is useful for checking if an IIT has been locked to a PIT.
        Returns 404 if no purchase intent exists for the given IIT (i.e., not yet locked).
      security:
        - IntegrationsJwt: [ ]
      parameters:
        - in: path
          name: iit
          required: true
          schema:
            type: string
          description: The Influence Intent token (JWT string)
      responses:
        "200":
          description: Purchase intent found (IIT was locked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseIntentResponse"
        "404":
          description: Purchase intent not found (IIT not yet locked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/integrations/intents/latest-unlocked:
    get:
      tags: [ Integrations ]
      summary: Latest unlocked purchase intent
      description: |
        Finds the latest unlocked purchase intent within the specified time period.

        This is useful for finding existing purchase intents that can be associated
        with new orders or checking for potential duplicate purchase intents.
      security:
        - IntegrationsJwt: [ ]
      parameters:
        - in: query
          name: hours
          required: false
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
          description: "Number of hours to look back (default: 24, max: 720)"
      responses:
        "200":
          description: Latest unlocked purchase intent found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseIntentResponse"
        "404":
          description: No unlocked purchase intent found for time window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /api/v1/auth/token:
    post:
      tags: [ Auth ]
      summary: OAuth2 client credentials token for integration API clients
      security:
        - BasicAuth: [ ]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [ grant_type ]
              properties:
                grant_type:
                  type: string
                  enum: [ client_credentials ]
                scope:
                  type: string
                client_id:
                  type: string
                  description: Optional when HTTP Basic auth is used.
                client_secret:
                  type: string
                  description: Optional when HTTP Basic auth is used.
            example:
              grant_type: client_credentials
              scope: "direct:links:write direct:intents:write direct:orders:write"
      responses:
        "200":
          description: Integration API token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
              example:
                access_token: "eyJhbGciOiJIUzI1NiJ9.example"
                token_type: "Bearer"
                expires_in: 3600
                scope: "direct:links:write direct:intents:write direct:orders:write"


  /{merchant_username}/{creator_username}/{link_code}:
    get:
      tags: [ Merchant ]
      summary: Public redirect endpoint issuing influence intent token (IIT)
      description: |
        Public redirect endpoint that automatically issues an Influence Intent Token (IIT) and redirects to the merchant destination.

        ## IIT Issuance (Automatic)
        This endpoint generates an IIT token automatically on click. The IIT is:
        - Issued automatically when users click tracking links
        - Appended to the redirect URL as `qdx_intent` query parameter
        - Stored client-side (sessionStorage) for later PIT locking
        - NOT a manual human dashboard operation

        ## Flow
        1. User clicks tracking link
        2. System validates link and issues IIT
        3. User is redirected to destination with `?qdx_intent=<token>`

        ## IIT Issuance Surfaces
        IIT can be issued through:
        - **Redirect flow** (this endpoint) - automatic on click
        - **Integrations API** (`POST /api/v1/integrations/intents/token`) - backend click flows

        IIT is NOT issued through:
        - Merchant dashboard (`/api/v1/merchant/**`) - human users do NOT manually issue IIT
        - Agent zone - AGENT is for PIT locking, not IIT issuance
      parameters:
        - in: path
          name: merchant_username
          required: true
          schema:
            type: string
        - in: path
          name: creator_username
          required: true
          schema:
            type: string
        - in: path
          name: link_code
          required: true
          schema:
            type: string
            minLength: 5
            maxLength: 5
      responses:
        "302":
          description: Redirect to merchant destination URL with `qdx_intent` query param
        "404":
          description: Merchant or link not found

  /api/v1/integrations/intents/token:
    post:
      tags: [ Integrations ]
      summary: Issue influence intent token (IIT) for backend click flows
      description: |
        Issues an Influence Intent Token (IIT) for authenticated machine-to-machine backend click flows.

        ## IIT Issuance (Machine)
        This endpoint allows authenticated Direct API clients to issue IIT tokens for merchant-controlled backend click flows.

        ## Use Cases
        - Custom link tracking outside standard redirect flow
        - Server-side click event processing
        - Backend integration scenarios where click events are processed programmatically

        ## Security
        - Requires valid Direct API JWT with `scope:direct:intents:write`
        - Influence link must exist
        - Inactive partner states are resolved later during attribution
        - NOT for human dashboard usage

        ## IIT vs PIT
        - **IIT** (this endpoint): Issued on click, tracks influence intent
        - **PIT**: Locked at add-to-cart, used for order attribution

        ## IIT Issuance Surfaces
        IIT can be issued through:
        - **Redirect flow** (`/{merchant}/{creator}/{link_code}`) - automatic on click
        - **Integrations API** (this endpoint) - backend click flows

        IIT is NOT issued through:
        - Merchant dashboard (`/api/v1/merchant/**`) - human users do NOT manually issue IIT
        - Agent zone - AGENT is for PIT locking, not IIT issuance
      security:
        - IntegrationsJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueInfluenceIntentTokenRequest"
      responses:
        "201":
          description: Influence intent token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfluenceIntentResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Missing or invalid Integrations JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: Insufficient scope (requires `direct:intents:write`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

components:
  securitySchemes:
    MerchantJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Qredex merchant JWT for Human Dashboard API (`/api/v1/merchant/**`).
        Obtained from Shopify OAuth token exchange (`/api/v1/auth/shopify/exchange`) or
        merchant password auth endpoints (`/api/v1/auth/merchant/password/*`).
    IntegrationsJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Qredex integrations JWT for SDK/machine-to-machine API (`/api/v1/integrations/**`).
        Obtained from client credentials flow (`/api/v1/auth/token`).
    InternalJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Qredex internal JWT for admin API (`/api/v1/internal/**`).
        Obtained from bootstrap credentials (`/api/v1/auth/internal/token`).
    ShopifySession:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Shopify App Bridge session token. Used only for `/api/v1/auth/shopify/exchange`.
    BasicAuth:
      type: http
      scheme: basic
      description: |
        Bootstrap credentials for internal auth. Used only for `/api/v1/auth/internal/token`.

  schemas:
    MerchantPasswordLoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    SetupMerchantPasswordRequest:
      type: object
      required: [ email, setup_code, new_password ]
      properties:
        email:
          type: string
          format: email
        setup_code:
          type: string
        new_password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [ refresh_token ]
      properties:
        refresh_token:
          type: string

    IssueInternalTokenRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    InternalAuthTokenResponse:
      type: object
      properties:
        access_token: { type: string }
        expires_in: { type: integer, format: int64 }
        refresh_token: { type: string }
        refresh_expires_in: { type: integer, format: int64 }
        token_type: { type: string }
        email: { type: string }
        role: { type: string }

    OAuthTokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer, format: int64 }
        scope: { type: string }

    DirectScope:
      type: string
      enum:
        - "direct:api"
        - "direct:merchant:read"
        - "direct:merchant:write"
        - "direct:links:read"
        - "direct:links:write"
        - "direct:creators:read"
        - "direct:creators:write"
        - "direct:orders:read"
        - "direct:orders:write"
        - "direct:intents:read"
        - "direct:intents:write"

    DuplicateConfidence:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH

    DuplicateReason:
      type: string
      enum:
        - EXACT_EXTERNAL_ORDER_ID
        - CHECKOUT_TOKEN_MATCH
        - CUSTOMER_EMAIL_HASH_MATCH
        - AMOUNT_TIME_MATCH

    IntegrityReason:
      type: string
      enum:
        - MISSING
        - TAMPERED
        - EXPIRED
        - MISMATCHED
        - REPLACED
        - LINK_INACTIVE
        - CREATOR_INACTIVE

    OriginMatchStatus:
      type: string
      enum:
        - MATCH
        - MISMATCH
        - ABSENT
        - UNKNOWN

    IntegrityBand:
      type: string
      enum:
        - HIGH
        - MEDIUM
        - LOW
        - CRITICAL

    ResolutionStatus:
      type: string
      enum:
        - ATTRIBUTED
        - UNATTRIBUTED
        - REJECTED

    OrderAttributionScoreBreakdownResponse:
      type: object
      properties:
        score_version: { type: integer }
        base_score: { type: integer }
        origin_adjustment: { type: integer }
        duplicate_adjustment: { type: integer }
        final_score: { type: integer }
        token_integrity: { type: string, nullable: true }
        integrity_reason:
          $ref: "#/components/schemas/IntegrityReason"
          nullable: true
        window_status: { type: string, nullable: true }
        resolution_status:
          $ref: "#/components/schemas/ResolutionStatus"
        origin_match_status:
          $ref: "#/components/schemas/OriginMatchStatus"
        duplicate_confidence:
          $ref: "#/components/schemas/DuplicateConfidence"
          nullable: true
        review_required: { type: boolean }
        review_reasons:
          type: array
          items: { type: string }

    MerchantApiTokenResponse:
      type: object
      properties:
        access_token: { type: string }
        expires_in: { type: integer, format: int64 }
        refresh_token: { type: string }
        refresh_expires_in: { type: integer, format: int64 }
        token_type: { type: string }

    MerchantHealthResponse:
      type: object
      properties:
        status: { type: string }
        merchant_id: { type: string, format: uuid }
        shop_domain: { type: string }
        time: { type: string, format: date-time }

    MerchantDashboardResponse:
      type: object
      properties:
        active_links: { type: integer, format: int64 }
        orders_count: { type: integer, format: int64 }
        gmv_total: { type: number, format: double }
        system_health:
          $ref: "#/components/schemas/MerchantSystemHealthResponse"

    MerchantStoreDashboardResponse:
      type: object
      properties:
        store_id: { type: string, format: uuid }
        platform:
          type: string
          enum: [ SHOPIFY, DIRECT_API ]
        domain: { type: string }
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        last_webhook_at: { type: string, format: date-time, nullable: true }
        last_webhook_minutes_ago: { type: integer, format: int64, nullable: true }
        recent_webhook_failures: { type: integer, format: int64 }
        webhook_receiving_events: { type: boolean }
        active_webhook_subscriptions: { type: integer, format: int64 }

    MerchantSystemHealthResponse:
      type: object
      properties:
        app_installed_correctly: { type: boolean }
        webhook_receiving_events: { type: boolean }
        attribution_locking_active: { type: boolean }
        no_errors_detected: { type: boolean }
        last_webhook_minutes_ago: { type: integer, format: int64, nullable: true }

    MerchantSummaryResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchant_code: { type: string }
        username: { type: string }
        shop_domain: { type: string }
        status: { type: string }
        enabled_order_sources:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [ SHOPIFY, DIRECT_API ]
        cross_source_duplicate_policy:
          type: string
          enum: [ALLOW_AND_FLAG, REJECT]
        installed_at: { type: string, format: date-time }
        uninstalled_at: { type: string, format: date-time, nullable: true }
        last_webhook_at: { type: string, format: date-time, nullable: true }
        api_token_version: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MerchantMemberRole:
      type: string
      enum: [OWNER, ADMIN, EDITOR, VIEWER]

    CreateMerchantUserRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/MerchantMemberRole"
          description: |
            Role to assign to the user.

            **Restrictions:**
            - `OWNER` cannot be assigned via this API. OWNER is only assigned via:
              - Shopify install auto-provisioning (first installer becomes OWNER)
              - Internal admin API (`PATCH /api/v1/internal/merchants/{merchantId}/users/{userId}/role`)
            - Attempting to assign `OWNER` will result in a 400 Bad Request response.

    UpdateMerchantUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/MerchantMemberRole"
          description: |
            New role to assign to the user.

            **Restrictions:**
            - `OWNER` cannot be assigned or demoted via this API. OWNER role changes are only allowed via:
              - Internal admin API (`PATCH /api/v1/internal/merchants/{merchantId}/users/{userId}/role`)
            - Attempting to assign `OWNER` will result in a 400 Bad Request response.
            - Demoting the last `OWNER` will result in a 400 Bad Request response.

    UpdateMerchantMemberRoleRequest:
      type: object
      required: [role, reason]
      properties:
        role:
          $ref: "#/components/schemas/MerchantMemberRole"
        reason:
          type: string
          minLength: 10
          description: Reason for the role change (required, min 10 characters)

    TransferMerchantOwnershipRequest:
      type: object
      required: [new_owner_user_id, reason]
      properties:
        new_owner_user_id:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 1

    MerchantUserResponse:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        status:
          type: string
          enum: [ACTIVE, DISABLED]
        role:
          $ref: "#/components/schemas/MerchantMemberRole"
        membership_created_at: { type: string, format: date-time }

    UpdateInternalMerchantRequest:
      type: object
      properties:
        enabled_order_sources:
          type: array
          minItems: 1
          maxItems: 2
          uniqueItems: true
          items:
            type: string
            enum: [ SHOPIFY, DIRECT_API ]
        store_domain: { type: string }
        duplicate_policy:
          type: string
          enum: [ ALLOW_AND_FLAG, REJECT ]
        migration_override: { type: boolean, nullable: true }
        reason: { type: string, nullable: true }

    CreateCreatorRequest:
      type: object
      required: [handle]
      properties:
        handle: { type: string }
        display_name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        socials:
          type: object
          additionalProperties:
            type: string


    UpdateCreatorRequest:
      type: object
      properties:
        display_name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        socials:
          type: object
          additionalProperties:
            type: string

    CreatorResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        handle: { type: string }
        status: { type: string }
        display_name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        socials:
          type: object
          additionalProperties:
            type: string
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatorListResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        handle: { type: string }
        status: { type: string }
        display_name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        socials:
          type: object
          additionalProperties:
            type: string
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        links_count: { type: integer, format: int64 }
        orders_count: { type: integer, format: int64 }
        revenue_total: { type: number, format: double }

    CreatorPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatorListResponse"
        page: { type: integer }
        size: { type: integer }
        total_elements: { type: integer, format: int64 }
        total_pages: { type: integer }

    CreatorLinkResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        link_name: { type: string }
        link_code: { type: string }
        destination_path: { type: string }
        note: { type: string, nullable: true }
        status: { type: string }
        attribution_window_days: { type: integer }
        link_expiry_at: { type: string, format: date-time, nullable: true }
        discount_code: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatorLinksPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatorLinkResponse"
        page: { type: integer }
        size: { type: integer }
        total_elements: { type: integer, format: int64 }
        total_pages: { type: integer }

    CreateLinkRequest:
      type: object
      required: [ store_id, creator_id, link_name, destination_path ]
      properties:
        store_id: { type: string, format: uuid }
        creator_id: { type: string, format: uuid }
        link_name: { type: string }
        destination_path: { type: string }
        note: { type: string, nullable: true, maxLength: 500 }
        attribution_window_days: { type: integer, nullable: true }
        link_expiry_at: { type: string, format: date-time, nullable: true }
        discount_code: { type: string, nullable: true }
        status: { type: string, nullable: true }

    UpdateLinkRequest:
      type: object
      description: |
        Request to update link configuration.
        
        ## Update Rules
        
        - `link_name` - Always allowed
        - `note` - Always allowed
        - `attribution_window_days` - Only if NO intent exists (1, 3, 7, 14, 30)
        - `link_expiry_at` - Only if NO intent exists (must be future)
        - `discount_code` - Only if NO intent exists
        - `status` - `ACTIVE`→`DISABLED` always; `DISABLED`→`ACTIVE` only if NO intent
      properties:
        link_name: { type: string, nullable: true }
        note: { type: string, nullable: true, maxLength: 500 }
        attribution_window_days: { type: integer, nullable: true, enum: [1, 3, 7, 14, 30] }
        link_expiry_at: { type: string, format: date-time, nullable: true }
        discount_code: { type: string, nullable: true }
        status: { type: string, nullable: true, enum: [ACTIVE, DISABLED] }

    LinkResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchant_id: { type: string, format: uuid }
        store_id: { type: string, format: uuid }
        creator_id: { type: string, format: uuid }
        link_name: { type: string }
        link_code: { type: string }
        public_link_url: { type: string }
        destination_path: { type: string }
        note: { type: string, nullable: true }
        status: { type: string }
        attribution_window_days: { type: integer }
        link_expiry_at: { type: string, format: date-time, nullable: true }
        disabled_at: { type: string, format: date-time, nullable: true, description: "Timestamp when link was disabled (null if active)" }
        discount_code: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    LinkListResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        store_id: { type: string, format: uuid }
        link_name: { type: string }
        link_code: { type: string }
