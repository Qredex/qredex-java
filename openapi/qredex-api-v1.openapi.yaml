  /api/v1/integrations/links:
    get:
      tags: [ Integrations ]
      summary: List links
      description: |
        Retrieves a paginated list of influence links with optional filtering.

        ## Query Filters

        - `status` - Filter by link status (case-insensitive): `ACTIVE` or `DISABLED`
        - `destination` - Filter by exact destination path match
        - `expired` - Filter by expiration status: `true` (expired) or `false` (not expired)
          - `expired=true` returns links where `link_expiry_at` is not null and <= now()
          - `expired=false` returns links where `link_expiry_at` is null or > now()
      security:
        - IntegrationsJwt: [ ]
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
        - in: query
          name: size
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          description: Filter by link status (ACTIVE or DISABLED, case-insensitive)
          schema:
            type: string
            enum: [ACTIVE, DISABLED]
            example: ACTIVE
        - in: query
          name: destination
          required: false
          description: Filter by exact destination path match
          schema:
            type: string
            example: /collections/summer
        - in: query
          name: expired
          required: false
          description: Filter by expiration status (true = expired, false = not expired)
          schema:
            type: boolean
            example: false
      responses:
        "200":
          description: Link list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkPageResponse"
    post:
      tags: [ Integrations ]
      summary: Create link (machine-to-machine)
      description: |
        Creates a new influence link from backend/machine systems.

        This endpoint is the **authenticated machine surface** for link creation, designed for
        backend systems, SDKs, or automated tools that need to create influence links
        programmatically without human dashboard interaction.

        ## Difference from Merchant Link Creation

        | Aspect | Merchant Zone | Integrations Zone |
        |--------|--------------|-------------------|
        | Endpoint | `/api/v1/merchant/links` | `/api/v1/integrations/links` |
        | Authentication | Merchant JWT | Integrations JWT |
        | Use Case | Human dashboard/backoffice | Backend/machine automation |
        | Scope required | N/A (role-based) | `direct:links:write` |

        ## Security
        Requires valid Direct API JWT with `scope:direct:links:write` authority.
      security:
        - IntegrationsJwt: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
            example:
              store_id: "61abc354-dd8d-4a23-be02-ece77b1b4da6"
              creator_id: "16fca3f2-b346-4f98-8e52-0895aac61c5b"
              link_name: "spring-launch-link"
              destination_path: "/products/spring-launch"
              note: "Created by backend integration"
              attribution_window_days: 30
              discount_code: "SPRING30"
              status: "ACTIVE"
      responses:
        "201":
          description: Link created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Missing or invalid Integrations JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: Insufficient scope (requires `direct:links:write`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

