version: 1
project:
  name: Qredex Java Server SDK
  description: Official Java server SDK for machine-to-machine integrations
  type: library
metadata:
  team: sdk
  owner: Qredex
  repo_class: java-sdk
runtimes:
  java: '>=21'
execution:
  preferred: container
  supported:
    - native
    - container
  lifecycle: persistent
  backends:
    container:
      image: maven:3.9.14-eclipse-temurin-21-noble
      engines:
        - docker
tools:
  maven: '*'
tasks:
  setup:
    description: Warm the Maven dependency cache
    notes: |
      Use this first after cloning or when Maven dependencies change.
    category: setup
    run: mvn -q dependency:go-offline
    safe_for_agent: true
  build:
    description: Build the Java SDK
    notes: |
      Use this to confirm the SDK still builds before release work.
    category: build
    run: mvn package
    depends_on:
      - setup
    safe_for_agent: true
  test:
    description: Run the Java test suite
    notes: |
      Use this for the standard Java unit test pass.
    category: test
    run: mvn test
    depends_on:
      - setup
    safe_for_agent: true
  version:bump:
    description: Bump the release version
    notes: |
      Use this when preparing a new Java SDK release version.
      You can pass `major`, `minor`, `patch`, or an explicit semantic version.
      Typical flow:
        ota run version:bump --version minor
        ota run release-check
    category: release
    script: |
      ./scripts/release-version.sh
    inputs:
      version:
        description: Release bump selector or semantic version to apply
        required: true
  ci:
    description: Run the Java verification suite
    notes: |
      Use this as the canonical local verification path before merging changes.
    category: test
    run: mvn clean verify --batch-mode --no-transfer-progress -Dmaven.javadoc.skip=true
    depends_on:
      - setup
    safe_for_agent: true
  release-check:
    description: Run the Java release verification suite
    notes: |
      Use this to validate release readiness before publishing the SDK.
    category: release
    run: mvn clean verify -DskipGPG=true -Dmaven.javadoc.skip=true
    depends_on:
      - setup
    safe_for_agent: true
agent:
  entrypoint: setup
  default_task: ci
  safe_tasks:
    - setup
    - build
    - test
    - ci
    - release-check
  verify_after_changes:
    - test
    - ci
    - release-check
  writable_paths:
    - src
    - README.md
    - CHANGELOG.md
    - docs
  protected_paths:
    - target
    - pom.xml
    - ota.yaml
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow, the way npm is the default in Node repos.
    Use `ota validate` to verify the contract.
    Use `ota doctor` to inspect readiness and agent guidance.
    Use `ota tasks` to discover runnable repo actions.
    Use `ota run setup` to prepare the repo.
    Use `ota run ci` to run the canonical verification path.
    Keep the Java 8 compatibility boundary explicit.
    Use mvn test and mvn package as the primary verification and release path.
