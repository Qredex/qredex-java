name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'pom.xml'  # Skip CI on pom.xml-only changes (handled by release.yml)
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [8, 11, 17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ota
        if: matrix.java-version == 8
        run: curl -fsSL https://dist.ota.run/install.sh | sh

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Validate Ota contract
        if: matrix.java-version == 8
        run: ota validate

      - name: Build and test
        if: matrix.java-version == 8
        run: ota run ci

      - name: Build and test (Maven fallback)
        if: matrix.java-version != 8
        run: mvn clean verify --batch-mode --no-transfer-progress -Dmaven.javadoc.skip=true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-java-${{ matrix.java-version }}
          path: target/surefire-reports/
