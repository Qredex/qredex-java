name: Create release tag

on:
  push:
    branches:
      - main
    paths:
      - pom.xml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # Run CI first to validate the release
  ci-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [8, 11, 17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ota
        if: matrix.java-version == 8
        uses: ota-run/setup@v1
        with:
          ota-version: 1.4.4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Run release checks
        if: matrix.java-version == 8
        run: ota run release-check

      - name: Run release checks (Maven fallback)
        if: matrix.java-version != 8
        run: mvn clean verify --batch-mode --no-transfer-progress -DskipGPG=true -Dmaven.javadoc.skip=true

  # Create tag only after CI passes
  tag-release:
    needs: ci-validation
    runs-on: ubuntu-latest
    outputs:
      tag_created: ${{ steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false' }}
      tag_name: ${{ steps.version_check.outputs.current_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup ota
        uses: ota-run/setup@v1
        with:
          ota-version: 1.4.4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'maven'

      - name: Validate Ota contract
        run: ota validate

      - name: Check if version changed in pom.xml
        id: version_check
        run: |
          # Get current version
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Get previous version from parent commit
          git checkout HEAD~1 -- pom.xml 2>/dev/null || echo "No previous commit"
          PREVIOUS_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null || echo "none")
          git checkout HEAD -- pom.xml

          echo "Previous version: $PREVIOUS_VERSION"
          echo "Current version: $CURRENT_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✓ Version changed: $PREVIOUS_VERSION → $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✗ Version unchanged: $CURRENT_VERSION"
          fi

      - name: Block snapshot releases
        if: steps.version_check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.current_version }}"
          case "$VERSION" in
            *-SNAPSHOT)
              echo "Error: refusing to tag SNAPSHOT version: $VERSION"
              exit 1
              ;;
            *)
              echo "✓ Release version is non-SNAPSHOT: $VERSION"
              ;;
          esac

      - name: Check if tag exists
        id: tag_check
        if: steps.version_check.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.version_check.outputs.current_version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✗ Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✓ Tag $TAG does not exist, will create"
          fi

      - name: Create and push tag
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version_check.outputs.current_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${{ steps.version_check.outputs.current_version }}"
          git push origin "$TAG"
          echo "✓ Created and pushed tag: $TAG"

      - name: Trigger publish workflow
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version_check.outputs.current_version }}"
          gh workflow run publish.yml --ref main -f release_ref="$TAG"
          echo "✓ Triggered publish workflow for $TAG"
