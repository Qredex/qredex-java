name: Publish to Maven Central

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag to publish (e.g., v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Ota
        run: curl -fsSL https://dist.ota.run/install.sh | sh

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_ref }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi
          if [ -z "$TAG" ]; then
            echo "Release tag is required"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing tag: $TAG"

      - name: Checkout release tag
        run: |
          git checkout "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: 8
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Validate Ota contract
        run: ota validate

      - name: Verify version match
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG_VERSION="${{ steps.tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"  # strip v prefix
          case "$TAG_VERSION" in
            *-SNAPSHOT)
              echo "Error: snapshot tags cannot be published: $TAG_VERSION"
              exit 1
              ;;
          esac
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: pom.xml version ($POM_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version match confirmed: $POM_VERSION"

      - name: Run release checks
        run: ota run release-check

      - name: Check release credentials
        run: |
          test -n "${{ secrets.MAVEN_CENTRAL_USERNAME }}" || (echo "Missing MAVEN_CENTRAL_USERNAME" && exit 1)
          test -n "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" || (echo "Missing MAVEN_CENTRAL_PASSWORD" && exit 1)
          test -n "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" || (echo "Missing MAVEN_GPG_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.MAVEN_GPG_PASSPHRASE }}" || (echo "Missing MAVEN_GPG_PASSPHRASE" && exit 1)

      - name: Verify Maven Central deployment is configured
        run: |
          grep -q "central-publishing-maven-plugin" pom.xml || (echo "Missing central-publishing-maven-plugin in pom.xml." && exit 1)
          grep -q "maven-gpg-plugin" pom.xml || (echo "Missing maven-gpg-plugin in pom.xml." && exit 1)
          echo "Maven Central deployment configuration detected."

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          # Import GPG key
          echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import

          # Deploy to Maven Central via Central Portal plugin with GPG signing
          mvn -B clean deploy \
            -Dgpg.skip=false \
            -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE" \
            -DskipTests

          echo "✓ Published to Maven Central"

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"* %s" "$PREV_TAG"..HEAD)
          else
            NOTES=$(git log --pretty=format:"* %s" HEAD)
          fi
          
          # Escape for GitHub Actions output
          NOTES="${NOTES//%/\\%}"
          NOTES="${NOTES//$'\n'/%0A}"
          
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          
          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "✓ Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "${{ steps.release_notes.outputs.notes }}" \
              --verify-tag
            echo "✓ Created GitHub Release: $TAG"
          fi
