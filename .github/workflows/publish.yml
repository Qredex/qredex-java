name: Validate Java Release Tag

on:
  workflow_run:
    workflows:
      - Create release tag
    types:
      - completed
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag to publish (e.g., v0.1.0)"
        required: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_ref }}" ]; then
            TAG="${{ github.event.inputs.release_ref }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git describe --tags --abbrev=0)
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing tag: $TAG"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Verify version match
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG_VERSION="${{ steps.tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"  # strip v prefix
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: pom.xml version ($POM_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version match confirmed: $POM_VERSION"

      - name: Run release checks
        run: mvn clean verify

      - name: Check release credentials
        run: |
          test -n "${{ secrets.MAVEN_CENTRAL_USERNAME }}" || (echo "Missing MAVEN_CENTRAL_USERNAME" && exit 1)
          test -n "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" || (echo "Missing MAVEN_CENTRAL_PASSWORD" && exit 1)
          test -n "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" || (echo "Missing MAVEN_GPG_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.MAVEN_GPG_PASSPHRASE }}" || (echo "Missing MAVEN_GPG_PASSPHRASE" && exit 1)

      - name: Verify Maven Central deployment is configured
        run: |
          grep -q "<distributionManagement>" pom.xml || (echo "Missing distributionManagement in pom.xml." && exit 1)
          grep -q "maven-gpg-plugin" pom.xml || (echo "Missing maven-gpg-plugin in pom.xml." && exit 1)
          echo "Maven Central deployment configuration detected."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "Release ${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            --verify-tag
          echo "✓ Created GitHub Release: ${{ steps.tag.outputs.tag }}"
